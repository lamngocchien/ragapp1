services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - "./qdrant_data:/qdrant/storage"

  rag:
    build: .
    image: rag-offline:latest
    container_name: rag-app
    depends_on:
      - qdrant
    ports:
      - "8000:8000"
    volumes:
      # Chỉ mount app và entrypoint để linh hoạt cập nhật logic
      - ./app/app.py:/app/app.py
      - ./app/entrypoint.sh:/app/entrypoint.sh
      # Data vẫn để bên ngoài để nạp PDF mới
      - ./data:/app/data
    environment:
      - QDRANT_HOST=qdrant
    restart: always
